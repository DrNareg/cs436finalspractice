<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 436 Quiz Practice</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="fw-bold">📚 CS 436 Quiz Practice</span>
            </a>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Start Screen -->
        <div id="startScreen" class="start-screen">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h1 class="card-title mb-4">Welcome to Quiz Practice</h1>
                    <p class="card-text mb-4">Test your knowledge with random networking questions!</p>
                    
                    <!-- Mode Selection -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Mode:</label>
                        <div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="mode" id="practiceMode" value="practice" checked>
                                <label class="form-check-label" for="practiceMode">
                                    <strong>Practice Mode</strong> - Answer at your own pace
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="mode" id="testMode" value="test">
                                <label class="form-check-label" for="testMode">
                                    <strong>Test Mode</strong> - Answer all questions, results saved
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Number of Questions:</label>
                        <input type="number" id="numQuestions" class="form-control d-inline-block" style="width: 100px;" value="10" min="1" max="74">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Question Type:</label>
                        <div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="qtype" id="typeAll" value="all" checked>
                                <label class="form-check-label" for="typeAll">All Questions</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="qtype" id="typeMultiple" value="multiple_choice">
                                <label class="form-check-label" for="typeMultiple">Multiple Choice Only</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="qtype" id="typeMatching" value="matching">
                                <label class="form-check-label" for="typeMatching">Matching Only</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-lg me-2" onclick="startQuiz()">Start</button>
                    <button class="btn btn-info btn-lg" onclick="viewTestHistory()">View Test Results</button>
                </div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="quiz-screen" style="display: none;">
            <div class="mb-3">
                <div class="progress">
                    <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                </div>
                <p class="text-muted mt-2"><small>Question <span id="questionNumber">1</span> of <span id="totalQuestions">10</span></small></p>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <h4 id="questionText" class="card-title mb-4"></h4>
                    
                    <!-- Question Image -->
                    <div id="questionImage" style="display: none; margin-bottom: 20px;"></div>
                    
                    <!-- Multiple Choice -->
                    <div id="multipleChoice" style="display: none;">
                        <div id="choicesContainer"></div>
                    </div>

                    <!-- Matching -->
                    <div id="matching" style="display: none;">
                        <div id="pairsContainer"></div>
                    </div>

                    <div class="mt-4">
                        <button class="btn btn-success" id="submitBtn" onclick="submitAnswer()">Submit Answer</button>
                        <button class="btn btn-secondary" id="skipBtn" onclick="skipQuestion()">Skip</button>
                        <button class="btn btn-danger" onclick="exitQuiz()">Exit</button>
                    </div>
                </div>
            </div>

            <!-- Feedback -->
            <div id="feedback" class="mt-3" style="display: none;">
                <div id="feedbackContent"></div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="results-screen" style="display: none;">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h2 class="card-title mb-4">Quiz Complete!</h2>
                    <div class="score-circle">
                        <div class="score-text">
                            <span id="scorePercentage" class="display-4">0%</span>
                            <p>Correct: <span id="correctCount">0</span>/<span id="totalCount">10</span></p>
                        </div>
                    </div>
                    <div class="mt-4 mb-4">
                        <p id="scoreMessage" class="lead"></p>
                    </div>
                    <button class="btn btn-primary btn-lg" onclick="location.reload()">Try Again</button>
                </div>
            </div>
        </div>

        <!-- Test History Screen -->
        <div id="testHistoryScreen" class="test-history-screen" style="display: none;">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title mb-4">Test Results History</h2>
                    <div id="testList"></div>
                    <button class="btn btn-secondary btn-lg mt-4" onclick="backToStart()">Back to Home</button>
                </div>
            </div>
        </div>

        <!-- Test Review Screen -->
        <div id="testReviewScreen" class="test-review-screen" style="display: none;">
            <div class="card shadow">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="card-title">Test Review</h2>
                        <button type="button" class="btn-close" onclick="backToHistory()"></button>
                    </div>
                    
                    <div class="review-stats mb-4 p-3 bg-light rounded">
                        <div class="row">
                            <div class="col-md-4 text-center">
                                <h5>Score</h5>
                                <p class="lead" id="reviewScore">0%</p>
                            </div>
                            <div class="col-md-4 text-center">
                                <h5>Correct</h5>
                                <p class="lead" id="reviewCorrect">0/0</p>
                            </div>
                            <div class="col-md-4 text-center">
                                <h5>Date</h5>
                                <p class="lead" id="reviewDate">-</p>
                            </div>
                        </div>
                    </div>

                    <h5 class="mb-3">Incorrect Answers</h5>
                    <div id="incorrectAnswersContainer"></div>
                    
                    <button class="btn btn-secondary btn-lg mt-4" onclick="backToHistory()">Back to Results</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
